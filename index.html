<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Post - LIVE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gold: #ffd700; --dark: #1a1a1a; --card: #2a2a2a; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        nav { display: flex; background: #000; border-bottom: 2px solid var(--gold); }
        nav button { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: bold; }
        nav button.active { background: var(--card); color: var(--gold); border-bottom: 3px solid var(--gold); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .cash { font-size: 2.5em; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .inv-grid { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .market-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .sell-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: black; }
        .hidden { display: none; }
        #event-box { background: firebrick; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<header style="padding:10px; background:#000;">
    <div style="font-size:0.7em;">UW KAPITAAL</div>
    <div class="cash">€ <span id="cash">0</span></div>
    <div class="inv-grid">
        <div>🪵 <span id="inv-wood">0</span></div>
        <div>🪨 <span id="inv-stone">0</span></div>
        <div>💰 <span id="inv-gold">0</span></div>
    </div>
</header>

<nav>
    <button id="btn-market" class="active" onclick="showTab('market')">MARKT</button>
    <button id="btn-scan" onclick="showTab('scan')">SCANNER</button>
</nav>

<div class="container">
    <div id="event-box"></div>

    <div id="tab-market">
        <div class="market-item">
            <div>🪵 Hout: <b>€<span id="p-wood">0</span></b></div>
            <button class="sell-btn" onclick="sell('wood')">VERKOOP</button>
        </div>
        <div class="market-item">
            <div>🪨 Steen: <b>€<span id="p-stone">0</span></b></div>
            <button class="sell-btn" onclick="sell('stone')">VERKOOP</button>
        </div>
        <div class="market-item">
            <div>💰 Goud: <b>€<span id="p-gold">0</span></b></div>
            <button class="sell-btn" onclick="sell('gold')">VERKOOP</button>
        </div>
    </div>

    <div id="tab-scan" class="hidden">
        <div id="reader"></div>
        <input type="text" id="manual" placeholder="Code handmatig..." style="margin-top:10px; padding:10px; width:70%;">
        <button onclick="processCode(document.getElementById('manual').value)" style="padding:10px;">OK</button>
        <p id="msg"></p>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
      authDomain: "tradingpost-57b20.firebaseapp.com",
      // VOEG DEZE REGEL TOE:
      databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app", 
      projectId: "tradingpost-57b20",
      storageBucket: "tradingpost-57b20.firebasestorage.app",
      messagingSenderId: "358205969306",
      appId: "1:358205969306:web:b9f76471828595f6fca023",
      measurementId: "G-5V2LDELV02"
    };;

    // Initialiseer Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Spelersnaam (uniek per telefoon)
    let playerName = localStorage.getItem('tp_name') || "Speler_" + Math.floor(Math.random()*9999);
    localStorage.setItem('tp_name', playerName);

    let state = JSON.parse(localStorage.getItem('tp_state')) || { cash: 100, wood: 0, stone: 0, gold: 0, used: [] };
    let prices = { wood: 10, stone: 30, gold: 200 };

    // --- LIVE UPDATES VANUIT DATABASE ---
    db.ref('market/prices').on('value', (snap) => {
        if(snap.val()) {
            prices = snap.val();
            document.getElementById('p-wood').innerText = prices.wood;
            document.getElementById('p-stone').innerText = prices.stone;
            document.getElementById('p-gold').innerText = prices.gold;
        }
    });

    db.ref('market/event').on('value', (snap) => {
        const box = document.getElementById('event-box');
        if(snap.val()) {
            box.innerText = "🚨 " + snap.val();
            box.style.display = "block";
        } else {
            box.style.display = "none";
        }
    });

    // --- CODES DATABASE ---
    const CODES = { "WOOD1": {t:"wood", a:5}, "ROCK1": {t:"stone", a:2}, "GOLD1": {t:"gold", a:1} };

    function processCode(code) {
        code = code.toUpperCase();
        if(state.used.includes(code)) return alert("Code al gebruikt!");
        if(CODES[code]) {
            state[CODES[code].t] += CODES[code].a;
            state.used.push(code);
            save();
            alert("Ontvangen!");
        }
    }

    function sell(item) {
        if(state[item] > 0) {
            state.cash += state[item] * prices[item];
            state[item] = 0;
            save();
        }
    }

    function save() {
        localStorage.setItem('tp_state', JSON.stringify(state));
        document.getElementById('cash').innerText = Math.floor(state.cash);
        document.getElementById('inv-wood').innerText = state.wood;
        document.getElementById('inv-stone').innerText = state.stone;
        document.getElementById('inv-gold').innerText = state.gold;
        // Stuur score naar leaderboard
        db.ref('players/' + playerName).set({ cash: state.cash });
    }

    function showTab(t) {
        document.getElementById('tab-market').classList.toggle('hidden', t !== 'market');
        document.getElementById('tab-scan').classList.toggle('hidden', t !== 'scan');
        if(t === 'scan') startScanner();
    }

    function startScanner() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(processCode);
    }

    save();
</script>
</body>
</html>
