<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Post</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --gold: #ffd700; --dark: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        
        #name-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; width: 80%; border-radius: 8px; border: none; font-size: 1.1em; margin-bottom: 15px; }
        
        header { background: #000; padding: 20px; border-bottom: 2px solid var(--gold); }
        .cash { font-size: 3em; color: var(--gold); font-weight: bold; }
        
        .inv { display: flex; justify-content: space-around; padding: 15px; background: var(--card); margin: 10px; border-radius: 12px; }
        .inv-item { font-size: 1.2em; }

        nav { display: flex; background: #000; border-bottom: 1px solid #333; }
        nav button { flex: 1; padding: 15px; background: none; color: #888; border: none; font-weight: bold; font-size: 1em; }
        nav button.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .market-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .sell-btn { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.5s; z-index: 20000; pointer-events: none; }
        .hidden { display: none !important; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

<div id="toast">Melding</div>

<div id="name-overlay">
    <h1>Handelsspel</h1>
    <input type="text" id="name-in" placeholder="Kies een naam...">
    <button onclick="setName()" style="padding:15px 40px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">START</button>
</div>

<header>
    <div style="font-size: 0.8em; opacity: 0.6;">SALDO</div>
    <div class="cash">€ <span id="ui-cash">0</span></div>
    <div class="inv">
        <div class="inv-item">🪵 <span id="ui-wood">0</span></div>
        <div class="inv-item">🪨 <span id="ui-stone">0</span></div>
        <div class="inv-item">💰 <span id="ui-gold">0</span></div>
    </div>
</header>

<nav>
    <button id="nav-m" class="active" onclick="showTab('m')">MARKT</button>
    <button id="nav-s" onclick="showTab('s')">SCANNER</button>
</nav>

<div id="tab-m" style="padding: 10px;">
    <div id="event-box" style="background: #f02849; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; font-weight: bold;"></div>
    <div class="market-card"><div>🪵 Hout <br> <b>€<span id="p-wood">0</span></b></div> <button class="sell-btn" onclick="sell('wood')">VERKOOP</button></div>
    <div class="market-card"><div>🪨 Steen <br> <b>€<span id="p-stone">0</span></b></div> <button class="sell-btn" onclick="sell('stone')">VERKOOP</button></div>
    <div class="market-card"><div>💰 Goud <br> <b>€<span id="p-gold">0</span></b></div> <button class="sell-btn" onclick="sell('gold')">VERKOOP</button></div>
</div>

<div id="tab-s" class="hidden" style="padding: 10px;">
    <div id="reader"></div>
    <div style="margin-top: 20px;">
        <input type="text" id="manual-in" placeholder="Code..." style="width: 60%; background: #333; color: white;">
        <button onclick="useCode(document.getElementById('manual-in').value)" style="padding: 15px; background: var(--gold); border:none; border-radius:8px;">OK</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAGvUwRjfQQ0QSh2S4n6mGf8k7sZlBggEs",
        authDomain: "tradingpost-57b20.firebaseapp.com",
        databaseURL: "https://tradingpost-57b20-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tradingpost-57b20",
        storageBucket: "tradingpost-57b20.firebasestorage.app",
        messagingSenderId: "358205969306",
        appId: "1:358205969306:web:b9f76471828595f6fca023",
        measurementId: "G-5V2LDELV02"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let id = localStorage.getItem('tp_id') || "ID" + Math.floor(Math.random()*999999);
    localStorage.setItem('tp_id', id);
    let name = localStorage.getItem('tp_name');
    let state = JSON.parse(localStorage.getItem('tp_state')) || { cash: 100, wood: 0, stone: 0, gold: 0, used: [] };
    let prices = { wood: 0, stone: 0, gold: 0 };
    let codes = {};

    function setName() {
        let n = document.getElementById('name-in').value.trim();
        if(n.length < 2) return;
        name = n;
        localStorage.setItem('tp_name', name);
        document.getElementById('name-overlay').style.display = 'none';
        save();
    }

    if(name) document.getElementById('name-overlay').style.display = 'none';

    function toast(txt) {
        let t = document.getElementById('toast');
        t.innerText = txt; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    function save() {
        localStorage.setItem('tp_state', JSON.stringify(state));
        document.getElementById('ui-cash').innerText = Math.floor(state.cash);
        document.getElementById('ui-wood').innerText = state.wood;
        document.getElementById('ui-stone').innerText = state.stone;
        document.getElementById('ui-gold').innerText = state.gold;
        if(name) db.ref('players/' + id).set({ name: name, cash: state.cash });
    }

    db.ref('market/prices').on('value', snap => {
        prices = snap.val() || {wood:0, stone:0, gold:0};
        document.getElementById('p-wood').innerText = prices.wood;
        document.getElementById('p-stone').innerText = prices.stone;
        document.getElementById('p-gold').innerText = prices.gold;
    });

    db.ref('market/event').on('value', snap => {
        let b = document.getElementById('event-box');
        if(snap.val()) { b.innerText = snap.val(); b.style.display = 'block'; }
        else b.style.display = 'none';
    });

    db.ref('market/codes').on('value', snap => { codes = snap.val() || {}; });

    function useCode(c) {
        if(!c) return;
        c = c.toUpperCase().trim();
        document.getElementById('manual-in').value = "";
        if(state.used.includes(c)) return toast("❌ Al gebruikt");
        if(codes[c]) {
            state[codes[c].t] += codes[c].a;
            state.used.push(c);
            save(); toast("✅ Ontvangen!");
        } else toast("❌ Code onbekend");
    }

    function sell(item) {
        if(state[item] > 0) {
            state.cash += state[item] * prices[item];
            state[item] = 0;
            save(); toast("💰 Verkocht!");
        }
    }

    function showTab(t) {
        document.getElementById('tab-m').classList.toggle('hidden', t !== 'm');
        document.getElementById('tab-s').classList.toggle('hidden', t !== 's');
        document.getElementById('nav-m').classList.toggle('active', t === 'm');
        document.getElementById('nav-s').classList.toggle('active', t === 's');
        if(t === 's') startScanner();
    }

    let scanner = null;
    function startScanner() {
        if(!scanner) {
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render(useCode);
        }
    }
    save();
</script>
</body>
</html>
